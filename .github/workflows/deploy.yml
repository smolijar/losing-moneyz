name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Backtest validation
        run: pnpm backtest:validate

      - name: Build
        run: pnpm build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Upsert Coinmate secrets in Secret Manager
        env:
          COINMATE_CLIENT_ID: ${{ secrets.COINMATE_CLIENT_ID }}
          COINMATE_PUBLIC_KEY: ${{ secrets.COINMATE_PUBLIC_KEY }}
          COINMATE_PRIVATE_KEY: ${{ secrets.COINMATE_PRIVATE_KEY }}
        run: |
          PROJECT="${{ vars.FIREBASE_PROJECT_ID }}"
          for SECRET_NAME in COINMATE_CLIENT_ID COINMATE_PUBLIC_KEY COINMATE_PRIVATE_KEY; do
            if ! gcloud secrets describe "$SECRET_NAME" --project="$PROJECT" >/dev/null 2>&1; then
              gcloud secrets create "$SECRET_NAME" --project="$PROJECT" --replication-policy="automatic"
            fi
            printf '%s' "${!SECRET_NAME}" | gcloud secrets versions add "$SECRET_NAME" --project="$PROJECT" --data-file=-
          done

      - name: Deploy to Firebase
        run: npx firebase-tools deploy --force --project "${{ vars.FIREBASE_PROJECT_ID }}"
